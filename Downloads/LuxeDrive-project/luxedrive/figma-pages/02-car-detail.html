<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LO-FI — 02 Autodetail</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .specs-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: #ccc; border: 1.5px solid #ccc; margin: 24px 0; }
  .spec-cell { background: #e8e8e8; padding: 22px 20px; }
  .detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 60px; padding-top: 48px; border-top: 1.5px solid #ccc; }
  .detail-table { display: flex; flex-direction: column; gap: 1px; background: #ccc; border: 1.5px solid #ccc; }
  .detail-row { background: #e8e8e8; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="page-banner">
  02 — Autodetail pagina
  <a href="01-homepage.html">← 01 Homepage</a>
</div>

<!-- NAV -->
<nav class="wf-nav">
  <div class="wf-logo"></div>
  <div class="wf-nav-links">
    <div class="wf-nav-link"></div>
    <div class="wf-nav-link"></div>
    <div class="wf-nav-link"></div>
    <div class="wf-nav-cta"></div>
  </div>
</nav>

<!-- HERO FOTO -->
<div class="wf-img" style="aspect-ratio:16/8;max-height:70vh">
  <div class="wf-img-label" style="font-size:16px">GROTE HERO FOTO AUTO</div>
  <!-- gradient overlay -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,#d0d0d0,transparent)"></div>
</div>

<!-- CONTENT -->
<div class="wf-section" style="margin-top:-80px;position:relative;z-index:2">

  <!-- Back link -->
  <div class="wf-p" style="width:160px;margin-bottom:22px"></div>

  <!-- Merk label -->
  <div class="wf-label" style="width:80px"></div>

  <!-- Titel -->
  <div class="wf-h1" style="width:60%;margin-top:8px"></div>

  <!-- Prijs -->
  <div class="wf-price" style="width:200px;margin-top:8px;height:34px"></div>

  <!-- Specs 4-koloms -->
  <div class="specs-grid">
    <div class="spec-cell">
      <div class="wf-label" style="width:60px"></div>
      <div class="wf-h3" style="width:70px;margin-top:6px"></div>
    </div>
    <div class="spec-cell">
      <div class="wf-label" style="width:60px"></div>
      <div class="wf-h3" style="width:80px;margin-top:6px"></div>
    </div>
    <div class="spec-cell">
      <div class="wf-label" style="width:70px"></div>
      <div class="wf-h3" style="width:55px;margin-top:6px"></div>
    </div>
    <div class="spec-cell">
      <div class="wf-label" style="width:75px"></div>
      <div class="wf-h3" style="width:85px;margin-top:6px"></div>
    </div>
  </div>

  <!-- Beschrijving -->
  <div style="max-width:780px;margin-bottom:36px">
    <div class="wf-p" style="width:100%"></div>
    <div class="wf-p" style="width:98%"></div>
    <div class="wf-p" style="width:100%"></div>
    <div class="wf-p" style="width:95%"></div>
    <div class="wf-p" style="width:70%"></div>
  </div>

  <!-- Status + CTA -->
  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:10px;height:10px;border-radius:50%;background:#aaa"></div>
      <div class="wf-p" style="width:120px;margin:0"></div>
    </div>
    <div class="wf-btn-solid" style="width:180px">Interesse tonen</div>
    <div class="wf-btn-outline" style="width:100px">← Terug</div>
  </div>

  <!-- Extra info sectie -->
  <div class="detail-cols">
    <div>
      <div class="wf-label" style="width:120px;margin-bottom:12px"></div>
      <div class="wf-h2" style="width:80%"></div>
      <div class="wf-h2" style="width:55%"></div>
      <div style="margin-top:14px">
        <div class="wf-p" style="width:100%"></div>
        <div class="wf-p" style="width:95%"></div>
        <div class="wf-p" style="width:88%"></div>
        <div class="wf-p" style="width:75%"></div>
      </div>
    </div>
    <div class="detail-table">
      <div class="detail-row">
        <div class="wf-p" style="width:120px;margin:0"></div>
        <div class="wf-h3" style="width:40px;margin:0"></div>
      </div>
      <div class="detail-row">
        <div class="wf-p" style="width:100px;margin:0"></div>
        <div class="wf-h3" style="width:80px;margin:0"></div>
      </div>
      <div class="detail-row">
        <div class="wf-p" style="width:110px;margin:0"></div>
        <div class="wf-h3" style="width:100px;margin:0"></div>
      </div>
      <div class="detail-row">
        <div class="wf-p" style="width:100px;margin:0"></div>
        <div class="wf-h3" style="width:90px;margin:0"></div>
      </div>
      <div class="detail-row">
        <div class="wf-p" style="width:90px;margin:0"></div>
        <div class="wf-h3" style="width:80px;margin:0"></div>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="wf-footer" style="margin-top:80px">
  <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:30px;margin-bottom:24px">
    <div>
      <div class="wf-logo" style="margin-bottom:10px"></div>
      <div class="wf-p" style="width:180px"></div>
    </div>
    <div>
      <div class="wf-label" style="width:60px;margin-bottom:10px"></div>
      <div class="wf-p" style="width:130px"></div>
      <div class="wf-p" style="width:110px"></div>
    </div>
  </div>
  <div style="border-top:1px solid #bbb;padding-top:16px;display:flex;justify-content:space-between">
    <div class="wf-p" style="width:250px;margin:0"></div>
    <div class="wf-p" style="width:140px;margin:0"></div>
  </div>
</div>

</body>
</html>
