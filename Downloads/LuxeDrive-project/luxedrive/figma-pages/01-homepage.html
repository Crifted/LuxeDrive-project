<style>
  .hero { height: 100vh; background: #c0c0c0; position: relative; display: flex; align-items: flex-end; padding: 80px 48px; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #aaa 0%, rgba(160,160,160,0) 50%); }
  .hero-content { position: relative; z-index: 1; max-width: 700px; }
  .hero-meta { position: absolute; right: 48px; bottom: 80px; z-index: 1; display: flex; flex-direction: column; gap: 24px; text-align: right; }
  .hero-meta-item { border-right: 3px solid #999; padding-right: 14px; }
  .hero-meta-item .big { height: 28px; width: 60px; background: #999; border-radius: 2px; margin-left: auto; margin-bottom: 5px; }
  .hero-meta-item .small { height: 8px; width: 80px; background: #bbb; border-radius: 2px; margin-left: auto; }

  .marquee-bar { background: #d0d0d0; border-top: 1.5px solid #bbb; border-bottom: 1.5px solid #bbb; padding: 18px 48px; display: flex; gap: 24px; overflow: hidden; }
  .marquee-item { height: 20px; background: #bbb; border-radius: 2px; flex-shrink: 0; }

  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: #ccc; border: 1.5px solid #ccc; }
  .stat-cell { background: #e8e8e8; padding: 36px 28px; }

  .feature-block { display: grid; grid-template-columns: 1.25fr 1fr; gap: 1px; background: #ccc; border: 1.5px solid #ccc; margin-bottom: 48px; }
  .feature-img-area { min-height: 420px; }
  .feature-info-area { background: #e8e8e8; padding: 52px 44px; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
  .feature-specs-row { display: flex; gap: 24px; padding: 16px 0; }
  .feature-spec { display: flex; flex-direction: column; gap: 6px; }

  .filters-bar { display: flex; gap: 12px; padding: 18px 0 32px; border-top: 1.5px solid #ccc; }
  .filter-select { width: 160px; height: 38px; background: #e0e0e0; border: 1.5px solid #c0c0c0; border-radius: 2px; }

  .cards-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .card { background: #e8e8e8; border: 1.5px solid #ccc; overflow: hidden; }
  .card-img-area { aspect-ratio: 16/10; position: relative; }
  .card-body { padding: 20px 20px 22px; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1.5px solid #d0d0d0; margin-top: 10px; }

  .testi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .testi-card { background: #e8e8e8; border: 1.5px solid #ccc; padding: 32px 28px; }

  .cta-block { border: 2px solid #bbb; padding: 60px; display: flex; align-items: center; justify-content: space-between; gap: 30px; background: #e4e4e4; flex-wrap: wrap; }
  .cta-btns { display: flex; gap: 14px; }

  .footer-cols { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 48px; margin-bottom: 32px; }
  .footer-col-links { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
