<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LO-FI — 03 Admin Login</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { min-height: 100vh; }
  .login-wrap { padding: 100px 48px; display: flex; justify-content: center; background: #f2f2f2; }
  .login-card { width: 100%; max-width: 420px; background: #e8e8e8; border: 2px solid #ccc; padding: 48px 40px; }
  .form-field { margin-bottom: 20px; }
  .hint-block { margin-top: 24px; padding-top: 20px; border-top: 1.5px solid #ccc; display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>

<div class="page-banner">
  03 — Admin Login
  <a href="01-homepage.html">← 01 Homepage</a>
</div>

<!-- NAV -->
<nav class="wf-nav">
  <div class="wf-logo"></div>
  <div class="wf-nav-links">
    <div class="wf-nav-link"></div>
    <div class="wf-nav-link"></div>
    <div class="wf-nav-link"></div>
    <div class="wf-nav-cta"></div>
  </div>
</nav>

<!-- LOGIN FORM -->
<div class="login-wrap">
  <div class="login-card">

    <!-- Label + heading -->
    <div class="wf-label" style="width:130px"></div>
    <div class="wf-h2" style="width:80%;margin-top:8px"></div>
    <div class="wf-p" style="width:90%;margin:8px 0 28px"></div>

    <!-- E-mail -->
    <div class="form-field">
      <div class="wf-field-label">E-mailadres</div>
      <div class="wf-input"></div>
    </div>

    <!-- Wachtwoord -->
    <div class="form-field">
      <div class="wf-field-label">Wachtwoord</div>
      <div class="wf-input"></div>
    </div>

    <!-- Foutmelding placeholder -->
    <div class="wf-p" style="width:80%;background:#ddd;margin-bottom:14px"></div>

    <!-- Submit knop -->
    <div class="wf-btn-solid" style="width:100%">Inloggen</div>

    <!-- Demo credentials hint -->
    <div class="hint-block">
      <div class="wf-p" style="width:100%"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="wf-label" style="width:40px;margin:0"></div>
        <div class="wf-p" style="width:140px;margin:0;background:#ccc;border:1px solid #bbb;padding:3px 8px;height:auto"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="wf-label" style="width:60px;margin:0"></div>
        <div class="wf-p" style="width:120px;margin:0;background:#ccc;border:1px solid #bbb;padding:3px 8px;height:auto"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
