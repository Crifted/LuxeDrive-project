<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeDrive — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--panel:#0f0f13;--panel-2:#15151b;--line:#23232c;--gold:#c8a24c;--gold-soft:#e3c781;--text:#f4f1ea;--muted:#8a8a93}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
.serif{font-family:'Cormorant Garamond',serif}
.eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:500}
a{color:inherit;text-decoration:none}

nav{display:flex;align-items:center;justify-content:space-between;padding:14px 48px;background:rgba(8,8,10,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
.logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;letter-spacing:.04em}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:34px;align-items:center}
.nav-links a{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.nav-cta{border:1px solid var(--gold);color:var(--gold);padding:9px 20px}
</style>
</head>
<body>

<nav>
  <a href="01-homepage.html" class="logo">Luxe<span>Drive</span></a>
  <div class="nav-links">
    <a href="01-homepage.html">Collectie</a>
    <a href="#">Atelier</a>
    <a href="#">Concierge</a>
    <a href="#" class="nav-cta">Admin</a>
  </div>
</nav>

<!-- LOGIN CONTENT -->
<div style="padding:120px 48px;max-width:460px;margin:0 auto">
  <div style="background:var(--panel);border:1px solid var(--line);padding:52px 44px">

    <div class="eyebrow">Beveiligde toegang</div>
    <h2 class="serif" style="font-size:40px;font-weight:600;margin:12px 0 6px">Admin portaal</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:34px;line-height:1.6">Log in om de collectie te beheren.</p>

    <!-- E-mail veld -->
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">E-mailadres</label>
      <input type="email" placeholder="admin@luxedrive.nl" value="admin@luxedrive.nl"
        style="width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px">
    </div>

    <!-- Wachtwoord veld -->
    <div style="margin-bottom:28px">
      <label style="display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Wachtwoord</label>
      <input type="password" placeholder="••••••••" value="luxedrive2026"
        style="width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px">
    </div>

    <!-- Knop -->
    <a href="04-admin-dashboard.html" style="display:block;width:100%;background:var(--gold);color:#08080a;padding:16px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;text-align:center">
      Inloggen
    </a>

    <!-- Hint -->
    <div style="margin-top:28px;padding-top:22px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.9">
      Standaard inloggegevens (uit seeder):<br>
      E-mail <code style="color:var(--gold-soft);background:var(--panel-2);padding:2px 8px;font-size:12px">admin@luxedrive.nl</code><br>
      Wachtwoord <code style="color:var(--gold-soft);background:var(--panel-2);padding:2px 8px;font-size:12px">luxedrive2026</code>
    </div>
  </div>

  <!-- Terug link -->
  <div style="margin-top:24px;text-align:center">
    <a href="01-homepage.html" style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">← Terug naar collectie</a>
  </div>
</div>

<!-- Achtergrond subtiele glow -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(60% 60% at 50% 0%,rgba(200,162,76,.04),transparent)"></div>

</body>
</html>
